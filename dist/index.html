<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
  * {
    margin: 0;
    padding: 0;
  }
  body {
    overflow: hidden;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100%;   
    overflow: hidden;
    position: relative;
  }

  .bg-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .bg-topbar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background: #222;
  }

  .bg-sidebar {
    position: absolute;
    top: 20px;
    left: 0;
    width: 120px;
    height: calc(100% - 20px);
    background: #333;
  }

  .topbar {
    height: 20px;  
    flex-shrink: 0; 
    background: transparent;
    text-align: center;
    font-size: 16px;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
    position: relative;
    z-index: 2;
  }

  .main-area {
    display: flex;
    flex-grow: 1;
    position: relative;
    z-index: 2;
  }

  .sidebar {
    width: 80px;
    flex-shrink: 0;
    background: transparent;
    color: white; 
    height: 100vh;
    position: relative;
    z-index: 2;
  }

  .More {
    display: flex;
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    cursor: pointer;
    transition: 1s ease;
    position: relative;
  }
  .icon {
    margin-top: 15px;
    transition: 1s ease;
  }

  .text {
    top: 5px;
    font-size: 8px;
    text-transform: uppercase; 
    margin-top: 8px;
  }
  .More:hover {
    transform: translateY(-6px);
  }
  .More:hover .icon,
  .More:hover .text {
    transform: scale(1.2);
  }
  .SideButtonMore {
    position: absolute;
    right: 70px;     
    top: 55%;
    transform: translateY(-50%);
    background-color: rgb(255, 255, 255);
    height: 0;
    width: 8px;        
    border-radius: 40px;
    opacity: 0;
    z-index: 1;
    transition: height 0.5s ease-in-out, opacity 1s ease-in-out;
    filter: drop-shadow(0 0 5px oklch(100% 0.00011 271.152 / 0.8));
  }
  .More:hover .icon {
    filter: drop-shadow(0 0 5px oklch(100% 0.00011 271.152 / 0.8));
  }

  .More.active .SideButtonMore {
    height: 60px;
    opacity: 1;
  }


  .canvas {
    flex-grow: 1; 
    background: #111;
    position: relative;
    z-index: 2;
    border-radius: 40px;
  }
  .Home {
    width: 15;
  }

  </style>
</head>
<body>
  <div class="app">
  <div class="bg-container">
    <div class="bg-topbar"></div>
    <div class="bg-sidebar"></div>
  </div>
  <div class="topbar">FlowNodes - Daily Tasks</div>

  <div class="main-area">
    <div class="sidebar">
        <div class="More">
          <svg class="icon" xmlns="http://www.w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="6" x2="20" y2="6"></line>
            <line x1="4" y1="18" x2="20" y2="18"></line>
          </svg>
          <span class="text">more</span>
        <div class="SideButtonMore">
        </div>
        <div class=""Home>
          <svg width="120" height="120" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="
            M12 44
            L50 14
            L88 44
            L80 44
            L80 80
            Q80 92 68 92
            L62 92
            Q62 92 62 88
            L62 64
            Q62 60 50 60
            Q38 60 38 64
            L38 88
            Q38 92 38 92
            L32 92
            Q20 92 20 80
            L20 44
            Z"
            fill="none"
            stroke="white"
            stroke-width="3.5"
            stroke-linecap="round"
            stroke-linejoin="round"/>
          </svg>
        </div>
    </div>
    <div class="canvas"></div>
  </div>
</div>
<script>
  document.querySelector('.More').addEventListener('click', function() {
    this.classList.toggle('active');
  });
</script>
</body>
</html>
