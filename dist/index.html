<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FlowNodes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    :root {
      --bg-dark: #0f1113;
      --panel-color: #121214; 
      --accent-white: #ffffff;
      --indicator-height: 40px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-dark);
      color: #fff;
      font-family: "Inter", sans-serif;
      overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100vh; }

    .topbar {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Cinzel", serif;
      font-size: 16px;
      letter-spacing: 0.15em;
      background: var(--panel-color);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      z-index: 10;
    }

    .main-area {
      flex: 1;
      display: flex;
    }

    .sidebar {
      width: 90px;
      height: 100%;
      background: var(--panel-color);
      border-right: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      gap: 8px;
      position: relative;
    }

    .SideButtonMore {
      position: absolute;
      left: 0;
      top: 0;
      width: 4px;
      height: var(--indicator-height);
      background: var(--accent-white);
      border-radius: 0 10px 10px 0;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: 5;
      pointer-events: none;
    }

    .nav-btn {
      width: 68px;
      height: 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      z-index: 2;
    }

    .nav-btn.active {
      color: white;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-btn:hover:not(.active) {
      color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.03);
    }

    .icon {
      width: 22px;
      height: 22px;
      margin-bottom: 4px;
      stroke-width: 1.8;
    }

    .label {
      font-family: "Cinzel", serif;
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .canvas-container {
      flex: 1;
      padding: 16px;
      background: var(--bg-dark);
    }

    .canvas {
      width: 100%;
      height: 100%;
      background: #161618;
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .content-animate {
      animation: contentSlide 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes contentSlide {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="topbar">FlowNodes</div>

    <div class="main-area">
      <nav class="sidebar" id="sidebar-nav">
        <div class="SideButtonMore" id="side-indicator"></div>

        <div class="nav-btn active" data-key="menu">
          <i data-feather="menu" class="icon"></i>
          <div class="label">menu</div>
        </div>

        <div class="nav-btn" data-key="home">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"></path>
          </svg>
          <div class="label">home</div>
        </div>

        <div class="nav-btn" data-key="canvas">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <path d="M3 15l5-5 5 5 5-5 3 3"></path>
          </svg>
          <div class="label">canvas</div>
        </div>

        <div class="nav-btn" data-key="add">
          <i data-feather="plus" class="icon"></i>
          <div class="label">add</div>
        </div>

        <div class="nav-btn" data-key="edit">
          <i data-feather="edit-2" class="icon"></i>
          <div class="label">edit</div>
        </div>

        <div class="nav-btn" data-key="delete">
          <i data-feather="trash" class="icon"></i>
          <div class="label">delete</div>
        </div>
      </nav>

      <div class="canvas-container">
        <main class="canvas">
          <div id="content-area" class="content-animate">
            <h2 style="font-family: 'Cinzel', serif; font-size: 24px;">Canvas Ready</h2>
            <p style="opacity:0.4; margin-top:12px; line-height: 1.5;">BimBimBamBam.</p>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script>
    feather.replace();

    const buttons = document.querySelectorAll(".nav-btn");
    const indicator = document.getElementById("side-indicator");
    const contentArea = document.getElementById("content-area");

    function moveIndicator(btn) {
      const btnTop = btn.offsetTop;
      const btnHeight = btn.offsetHeight;
      const indHeight = indicator.offsetHeight;
      
      const targetPos = btnTop + (btnHeight / 2) - (indHeight / 2);
      indicator.style.transform = `translateY(${targetPos}px)`;
    }

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        
        moveIndicator(btn);
        
        const key = btn.getAttribute("data-key");
        contentArea.classList.remove("content-animate");
        void contentArea.offsetWidth;
        contentArea.classList.add("content-animate");
        
        contentArea.innerHTML = `
          <h2 style="font-family: 'Cinzel', serif; font-size: 24px;">${key.toUpperCase()}</h2>
          <p style="opacity:0.4; margin-top:12px;">You Clicked On ${key}.</p>
        `;
      });
    });

    window.addEventListener("load", () => {
      const activeBtn = document.querySelector(".nav-btn.active");
      if (activeBtn) moveIndicator(activeBtn);
    });
  </script>
</body>
</html>
