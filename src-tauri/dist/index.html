<!DOCTYPE html>
<html>
  <head><meta charset="UTF-8"></head>
  <body style="background: #1e1e1e; color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">
    
    <h1>🌸 FlowNodes: Day 5</h1>
    <button id="hello-btn" style="padding: 10px 20px; cursor: pointer;">Натисни мене</button>
    <p id="response"></p>

    <script>
      // Витягуємо invoke з нутрощів Tauri
      const { invoke } = window.__TAURI__.core;

      document.getElementById("hello-btn").addEventListener("click", async () => {
        // Стукаємо в Rust функцію "greet"
        const msg = await invoke("greet");
        document.getElementById("response").innerText = msg;
      });
    </script>
  </body>
</html>
