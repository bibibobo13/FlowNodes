<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FlowNodes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="src/style.css">
  <script type="module" src="src/main.ts"></script>
</head>
<body>

  <div class="app">
    <div class="topbar" data-tauri-drag-region>
      <div class="mac-controls">
        <div id="close" class="mac-dot close"></div>
        <div id="minimize" class="mac-dot minimize"></div>
        <div id="maximize" class="mac-dot maximize"></div>
      </div>
      <div class="window-title">FlowNodes</div>
    </div>

    <div class="main-area">
      <nav class="sidebar" id="sidebar-nav">
        <div class="SideButtonMore" id="side-indicator"></div>

        <div class="nav-btn active" data-key="menu">
          <i data-feather="menu" class="icon"></i>
          <div class="label">menu</div>
        </div>

        <div class="nav-btn" data-key="home">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10"></path>
          </svg>
          <div class="label">home</div>
        </div>

        <div class="nav-btn" data-key="canvas">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <path d="M3 15l5-5 5 5 5-5 3 3"></path>
          </svg>
          <div class="label">canvas</div>
        </div>

        <div class="nav-btn" data-key="add">
          <i data-feather="plus" class="icon"></i>
          <div class="label">add</div>
        </div>

        <div class="nav-btn" data-key="edit">
          <i data-feather="edit-2" class="icon"></i>
          <div class="label">edit</div>
        </div>

        <div class="nav-btn" data-key="delete">
          <i data-feather="trash" class="icon"></i>
          <div class="label">delete</div>
        </div>
      </nav>

      <div class="canvas-container">
        <main class="canvas">
          <div id="content-area" class="content-animate">
            <h2 style="font-family: 'Cinzel', serif; font-size: 24px;">Canvas Ready</h2>
            <p style="opacity:0.4; margin-top:12px; line-height: 1.5;">BimBimBamBam.</p>
          </div>
        </main>
      </div>
      <div id="popup" class="popup">
        <h1 class="TitleOfPopup">Whats The Name OF Your Task</h1>
        <input class="NameOfTask">
        <button class="Submit">Submit</button>
      </div>
    </div>
  </div>
</body>
</html>
